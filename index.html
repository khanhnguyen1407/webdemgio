<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đồng hồ thi cử</title>

  <!-- Icon (favicon) -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972531.png">

</head>

<body style="margin:0;background:#f5f5f5">

<div style="padding:1.5rem 1rem 2rem;max-width:540px;margin:0 auto;font-family:sans-serif">
  <audio id="audioHetGio" src="hetgio.mp3" preload="auto"></audio>

  <h2 style="font-size:18px;font-weight:500;margin-bottom:4px">Đồng hồ thi cử</h2>
  <p style="font-size:13px;margin-bottom:1.25rem;line-height:1.5">
    Kim đồng hồ chạy từ giờ bắt đầu và dừng khi hết thời gian làm bài.
  </p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem">
    <div>
      <label style="font-size:12px">Giờ bắt đầu thi</label>
      <input id="startTime" type="time" value="08:30"
        style="width:100%;padding:9px;border-radius:8px;border:1px solid #aaa">
    </div>
    <div>
      <label style="font-size:12px">Thời gian làm bài (phút)</label>
      <input id="duration" type="number" value="150"
        style="width:100%;padding:9px;border-radius:8px;border:1px solid #aaa">
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:1.5rem">
    <button id="btnStart"
      style="padding:9px 22px;border-radius:8px;border:none;background:#1a1a18;color:#fff">
      Bắt đầu
    </button>
    <button id="btnReset"
      style="padding:9px 22px;border-radius:8px;border:1px solid #aaa">
      Đặt lại
    </button>
  </div>

  <div id="alertBox" style="display:none;padding:9px;border-radius:8px;margin-bottom:.75rem"></div>

  <div style="display:flex;justify-content:center;margin-bottom:1.25rem">
    <canvas id="clock" width="280" height="280"></canvas>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem">
    <div style="background:#eee;border-radius:8px;padding:10px">
      <div>Bắt đầu</div>
      <div id="iStart">--:--</div>
    </div>
    <div style="background:#eee;border-radius:8px;padding:10px">
      <div>Kết thúc</div>
      <div id="iEnd">--:--</div>
    </div>
    <div style="background:#eee;border-radius:8px;padding:10px">
      <div>Còn lại</div>
      <div id="iLeft">-- phút</div>
    </div>
  </div>

  <div id="progSection" style="display:none">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
      <span>Tiến độ</span><span id="pctLbl">0%</span>
    </div>
    <div style="height:5px;background:#ddd;border-radius:3px">
      <div id="pBar" style="height:100%;background:#1D9E75;width:0%"></div>
    </div>
  </div>
</div>

<script>
// (giữ nguyên JS của bạn)
const cv=document.getElementById('clock');
const ctx=cv.getContext('2d');
const W=280,R=W/2,CR=R-12;
let startH=8,startM=30,totalMins=150;
let elapsedSec=0,ticker=null,running=false;

function fmt2(n){return String(n).padStart(2,'0')}
function addMins(h,m,mins){const t=h*60+m+mins;return{h:Math.floor(t/60)%24,m:t%60}}
function fmtHM(h,m){return fmt2(h)+':'+fmt2(m)}

function getAngles(eSec){
  const base=startH*3600+startM*60;
  const cur=base+eSec;
  const h12=Math.floor(cur/3600)%12;
  const mm=Math.floor((cur%3600)/60);
  const ss=cur%60;
  const hr=((h12*3600+mm*60+ss)/43200)*Math.PI*2-Math.PI/2;
  const mn=((mm*60+ss)/3600)*Math.PI*2-Math.PI/2;
  const sc=(ss/60)*Math.PI*2-Math.PI/2;
  return{hr,mn,sc};
}

function timeAngle(h,m){
  return(((h%12)*3600+m*60)/43200)*Math.PI*2-Math.PI/2;
}

function draw(){
  ctx.clearRect(0,0,W,W);
  const cx=R,cy=R;

  ctx.beginPath();
  ctx.arc(cx,cy,CR,0,Math.PI*2);
  ctx.fillStyle='#fafaf8';
  ctx.fill();

  ctx.strokeStyle='#ccc';
  ctx.stroke();

  ctx.fillStyle='#333';
  ctx.textAlign='center';
  ctx.fillText("Clock",cx,cy);

  ctx.beginPath();
  ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fill();
}

function updateUI(){
  const endHM=addMins(startH,startM,totalMins);
  const leftSec=Math.max(0,totalMins*60-elapsedSec);
  const pct=Math.min(100,Math.round(elapsedSec/(totalMins*60)*100));

  document.getElementById('iStart').textContent=fmtHM(startH,startM);
  document.getElementById('iEnd').textContent=fmtHM(endHM.h,endHM.m);
  document.getElementById('pctLbl').textContent=pct+'%';
  document.getElementById('pBar').style.width=pct+'%';

  if(leftSec<=0){
    document.getElementById('audioHetGio').play();
    document.getElementById('iLeft').textContent='Hết giờ!';
    stop();
  } else {
    document.getElementById('iLeft').textContent=Math.floor(leftSec/60)+' phút';
  }
}

function stop(){if(ticker){clearInterval(ticker);ticker=null}running=false}

document.getElementById('btnStart').onclick=()=>{
  const tv=document.getElementById('startTime').value;
  const dur=parseInt(document.getElementById('duration').value);
  const[hh,mm]=tv.split(':').map(Number);

  startH=hh;startM=mm;totalMins=dur;
  elapsedSec=0;running=true;

  updateUI();
  ticker=setInterval(()=>{elapsedSec++;updateUI();draw()},1000);
};

document.getElementById('btnReset').onclick=()=>{
  stop();
  elapsedSec=0;
  updateUI();
};

draw();
</script>

</body>
</html>
